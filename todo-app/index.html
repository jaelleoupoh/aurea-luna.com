<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Application To-Do List - Gestion des tâches avec stockage local">
  <title>To-Do List - Gestionnaire de Tâches</title>
  <link rel="stylesheet" href="assets/style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

<div class="container">
  <!-- Header -->
  <header class="app-header">
    <div class="header-content">
      <h1><i class="fas fa-check-circle"></i> Ma Liste de Tâches</h1>
      <p class="tagline">Organisez vos tâches efficacement</p>
    </div>
    <button id="clearAllBtn" class="btn btn-danger btn-small" title="Supprimer toutes les tâches">
      <i class="fas fa-trash-alt"></i> Tout effacer
    </button>
  </header>

  <!-- Stats -->
  <div class="stats-container">
    <div class="stat-item">
      <span class="stat-label">Total</span>
      <span class="stat-value" id="totalTasks">0</span>
    </div>
    <div class="stat-item">
      <span class="stat-label">Complétées</span>
      <span class="stat-value completed" id="completedTasks">0</span>
    </div>
    <div class="stat-item">
      <span class="stat-label">Restantes</span>
      <span class="stat-value pending" id="pendingTasks">0</span>
    </div>
    <div class="stat-item">
      <span class="stat-label">Priorité Haute</span>
      <span class="stat-value priority" id="highPriorityTasks">0</span>
    </div>
  </div>

  <!-- Input Section -->
  <div class="input-section">
    <form id="todoForm" class="todo-form">
      <div class="input-group">
        <input 
          type="text" 
          id="todoInput" 
          class="todo-input" 
          placeholder="Ajouter une nouvelle tâche..."
          autocomplete="off"
          required
        >
        <select id="prioritySelect" class="priority-select">
          <option value="low">Basse</option>
          <option value="medium" selected>Moyenne</option>
          <option value="high">Haute</option>
        </select>
        <button type="submit" class="btn btn-primary">
          <i class="fas fa-plus"></i> Ajouter
        </button>
      </div>
    </form>
  </div>

  <!-- Filter Section -->
  <div class="filter-section">
    <button class="filter-btn active" data-filter="all">
      <i class="fas fa-list"></i> Toutes
    </button>
    <button class="filter-btn" data-filter="pending">
      <i class="fas fa-hourglass-half"></i> En cours
    </button>
    <button class="filter-btn" data-filter="completed">
      <i class="fas fa-check"></i> Complétées
    </button>
    <button class="filter-btn" data-filter="high">
      <i class="fas fa-exclamation-circle"></i> Priorité
    </button>
  </div>

  <!-- Search Section -->
  <div class="search-section">
    <input 
      type="text" 
      id="searchInput" 
      class="search-input" 
      placeholder="🔍 Rechercher une tâche..."
    >
    <span class="search-icon"><i class="fas fa-search"></i></span>
  </div>

  <!-- Sort Section -->
  <div class="sort-section">
    <label for="sortSelect">Trier par:</label>
    <select id="sortSelect" class="sort-select">
      <option value="date-desc">Date (Plus récente)</option>
      <option value="date-asc">Date (Plus ancienne)</option>
      <option value="priority">Priorité</option>
      <option value="alpha">Alphabétique</option>
    </select>
  </div>

  <!-- Tasks List -->
  <div class="tasks-container">
    <ul id="todoList" class="todo-list">
      <!-- Tasks will be inserted here -->
    </ul>
    <div id="emptyState" class="empty-state">
      <div class="empty-icon"><i class="fas fa-inbox"></i></div>
      <h3>Aucune tâche</h3>
      <p>Ajoutez une nouvelle tâche pour commencer!</p>
    </div>
  </div>

  <!-- Progress Bar -->
  <div class="progress-section">
    <div class="progress-label">
      <span>Progression</span>
      <span id="progressPercent">0%</span>
    </div>
    <div class="progress-bar">
      <div id="progressFill" class="progress-fill"></div>
    </div>
  </div>

  <!-- Footer -->
  <footer class="app-footer">
    <p>📝 To-Do List App • Données sauvegardées localement • <span id="lastSaved">Jamais</span></p>
  </footer>
</div>

<!-- Toast Notifications -->
<div id="toastContainer" class="toast-container"></div>

<script src="assets/app.js"></script>
</body>
</html>
